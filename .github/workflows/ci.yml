name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  # ── Detect which apps have changed ────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      go-app:       ${{ steps.filter.outputs.go-app }}
      node-app:     ${{ steps.filter.outputs.node-app }}
      rust-app:     ${{ steps.filter.outputs.rust-app }}
      python-app:   ${{ steps.filter.outputs.python-app }}
      java-app:     ${{ steps.filter.outputs.java-app }}
      go-task-api:  ${{ steps.filter.outputs.go-task-api }}
      python-worker: ${{ steps.filter.outputs.python-worker }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            go-app:
              - 'apps/go-app/**'
            node-app:
              - 'apps/node-app/**'
            rust-app:
              - 'apps/rust-app/**'
            python-app:
              - 'apps/python-app/**'
            java-app:
              - 'apps/java-app/**'
            go-task-api:
              - 'apps/go-task-api/**'
            python-worker:
              - 'apps/python-worker/**'

  # ── go-app ────────────────────────────────────────────────────────────────
  go-app:
    needs: changes
    if: needs.changes.outputs.go-app == 'true'
    runs-on: ubuntu-latest
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/go-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/go-app/go.mod
      - name: Lint & Test
        working-directory: apps/go-app
        run: |
          go vet ./...
          go test ./...
      - uses: buildpacks/github-actions/setup-pack@v5
      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build image
        working-directory: apps/go-app
        run: pack build ${{ env.IMAGE }}:${{ github.sha }} --builder paketobuildpacks/builder:base
      - name: Push image
        if: github.event_name == 'push'
        run: |
          docker tag ${{ env.IMAGE }}:${{ github.sha }} ${{ env.IMAGE }}:latest
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

  # ── node-app ──────────────────────────────────────────────────────────────
  node-app:
    needs: changes
    if: needs.changes.outputs.node-app == 'true'
    runs-on: ubuntu-latest
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/node-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Lint
        working-directory: apps/node-app
        run: |
          npm ci
          node --check index.js
      - uses: buildpacks/github-actions/setup-pack@v5
      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build image
        working-directory: apps/node-app
        run: pack build ${{ env.IMAGE }}:${{ github.sha }} --builder paketobuildpacks/builder:base
      - name: Push image
        if: github.event_name == 'push'
        run: |
          docker tag ${{ env.IMAGE }}:${{ github.sha }} ${{ env.IMAGE }}:latest
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

  # ── rust-app ──────────────────────────────────────────────────────────────
  rust-app:
    needs: changes
    if: needs.changes.outputs.rust-app == 'true'
    runs-on: ubuntu-latest
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/rust-app
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust components
        run: rustup component add rustfmt clippy
      - name: Lint & Test
        working-directory: apps/rust-app
        run: |
          cargo fmt --check
          cargo clippy -- -D warnings
          cargo test
      - uses: buildpacks/github-actions/setup-pack@v5
      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build image
        working-directory: apps/rust-app
        run: pack build ${{ env.IMAGE }}:${{ github.sha }} --builder paketobuildpacks/builder:full
      - name: Push image
        if: github.event_name == 'push'
        run: |
          docker tag ${{ env.IMAGE }}:${{ github.sha }} ${{ env.IMAGE }}:latest
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

  # ── python-app ────────────────────────────────────────────────────────────
  python-app:
    needs: changes
    if: needs.changes.outputs.python-app == 'true'
    runs-on: ubuntu-latest
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/python-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Lint & Test
        working-directory: apps/python-app
        run: |
          pip install ruff
          ruff check .
          python -m py_compile main.py
      - uses: buildpacks/github-actions/setup-pack@v5
      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build image
        working-directory: apps/python-app
        run: pack build ${{ env.IMAGE }}:${{ github.sha }} --builder paketobuildpacks/builder:base
      - name: Push image
        if: github.event_name == 'push'
        run: |
          docker tag ${{ env.IMAGE }}:${{ github.sha }} ${{ env.IMAGE }}:latest
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

  # ── java-app ──────────────────────────────────────────────────────────────
  java-app:
    needs: changes
    if: needs.changes.outputs.java-app == 'true'
    runs-on: ubuntu-latest
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/java-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven
      - name: Build & Test
        working-directory: apps/java-app
        run: mvn verify -q
      - uses: buildpacks/github-actions/setup-pack@v5
      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build image
        working-directory: apps/java-app
        run: pack build ${{ env.IMAGE }}:${{ github.sha }} --builder paketobuildpacks/builder:base
      - name: Push image
        if: github.event_name == 'push'
        run: |
          docker tag ${{ env.IMAGE }}:${{ github.sha }} ${{ env.IMAGE }}:latest
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

  # ── go-task-api ───────────────────────────────────────────────────────────
  go-task-api:
    needs: changes
    if: needs.changes.outputs.go-task-api == 'true'
    runs-on: ubuntu-latest
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/go-task-api
    steps:
      - uses: actions/checkout@v4
      - name: Install SQLite dev headers
        run: sudo apt-get install -y gcc libsqlite3-dev
      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/go-task-api/go.mod
      - name: Lint & Test
        working-directory: apps/go-task-api
        run: |
          go vet ./...
          go test ./...
      - uses: buildpacks/github-actions/setup-pack@v5
      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build image
        working-directory: apps/go-task-api
        run: pack build ${{ env.IMAGE }}:${{ github.sha }} --builder paketobuildpacks/builder:base
      - name: Push image
        if: github.event_name == 'push'
        run: |
          docker tag ${{ env.IMAGE }}:${{ github.sha }} ${{ env.IMAGE }}:latest
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

  # ── python-worker ─────────────────────────────────────────────────────────
  python-worker:
    needs: changes
    if: needs.changes.outputs.python-worker == 'true'
    runs-on: ubuntu-latest
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/python-worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Lint & Test
        working-directory: apps/python-worker
        run: |
          pip install ruff
          ruff check .
          python -m py_compile main.py
      - uses: buildpacks/github-actions/setup-pack@v5
      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build image
        working-directory: apps/python-worker
        run: pack build ${{ env.IMAGE }}:${{ github.sha }} --builder paketobuildpacks/builder:base
      - name: Push image
        if: github.event_name == 'push'
        run: |
          docker tag ${{ env.IMAGE }}:${{ github.sha }} ${{ env.IMAGE }}:latest
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest
